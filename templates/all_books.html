{% extends "base.html" %}

{% block container %}
  <h2>All Books (A-Z)</h2>

  <div class="bookList">
    {% for book in books %}
      <div class="bookItem">
        <h3>
          <a href="{{ url_for('book_detail', bookId=book.bookId) }}">
            {{ book.title }}
          </a>
        </h3>
        <p>{{ book.author }}</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
